<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınav Yeri Sorgulama Sistemi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding-top: 50px; 
            background: #f4f7f6; 
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h2 {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #718096;
            margin-bottom: 6px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #4a5568;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: #4299e1;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(49, 130, 206, 0.4);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: left;
            transition: all 0.3s ease;
        }

        .basarili {
            background: #ffffff;
            border-left: 6px solid #1a73e8;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hata {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sınav Yeri Sorgulama</h2>
    
    <label for="courseSelect">SINAVINA GİRECEĞİNİZ TEMEL DERS</label>
    <select id="courseSelect">
        <option value="" disabled selected>Ders seçimi yapınız...</option>
        <option value="matematik.csv">Matematik-1</option>
        <option value="fizik.csv">Fizik-1</option>
        <option value="lineer.csv">Lineer Cebir</option>
    </select>

    <label for="studentId">ÖĞRENCİ NUMARANIZ</label>
    <input type="text" id="studentId" placeholder="Örn: 22011001" autocomplete="off">
    
    <button onclick="searchExam()">SORGULA</button>

    <div id="result"></div>
</div>

<script>
function searchExam() {
    const dersDosyasi = document.getElementById('courseSelect').value;
    const no = document.getElementById('studentId').value.trim();
    const sonucDiv = document.getElementById('result');

    if (!dersDosyasi) { alert("Lütfen bir ders seçin"); return; }
    if (!no) { alert("Lütfen numaranızı girin"); return; }

    // Tarayıcı önbelleğini engellemek için versiyon ekliyoruz (A yöntemi)
    const dosyaYolu = dersDosyasi + "?v=" + new Date().getTime();

    Papa.parse(dosyaYolu, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const liste = results.data;
            // CSV'deki başlıkların No, Ad, Soyad, Fakulte, Derslik olduğundan emin olun
            const student = liste.find(o => o.No === no);

            sonucDiv.style.display = "block";
            
            if (student) {
                sonucDiv.className = "basarili";
                const tamAd = `${student.Ad} ${student.Soyad}`;
                
                sonucDiv.innerHTML = `
                    <div style="text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                        <span style="font-size: 1.1rem; color: #2c3e50;">Sayın</span><br>
                        <strong style="font-size: 1.4rem; color: #1a73e8; text-transform: uppercase;">${tamAd}</strong>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <small style="color: #7f8c8d; display: block; margin-bottom: 4px;">FAKÜLTE</small>
                        <span style="font-size: 1.1rem; font-weight: 600; color: #34495e;">${student.Fakulte}</span>
                    </div>

                    <div style="margin-bottom: 10px;">
                        <small style="color: #7f8c8d; display: block; margin-bottom: 4px;">SINAV SALONU</small>
                        <span style="font-size: 1.3rem; font-weight: 800; color: #e74c3c;">${student.Derslik}</span>
                    </div>
                `;
            } else {
                sonucDiv.className = "hata";
                sonucDiv.innerHTML = "Kayıt bulunamadı. Lütfen numaranızı ve dersi kontrol ediniz.";
            }
        },
        error: function() {
            alert("Veri dosyasına ulaşılamadı. CSV dosyasının adını ve GitHub'daki varlığını kontrol edin.");
        }
    });
}
</script>

</body>
</html>
